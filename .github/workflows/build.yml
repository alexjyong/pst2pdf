name: Build pst2pdf Binaries

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: "Linux (x86_64)"
        type: boolean
        default: true
      build_windows:
        description: "Windows (x86_64)"
        type: boolean
        default: true
      build_macos:
        description: "macOS (arm64 + x86_64 universal)"
        type: boolean
        default: true

jobs:
  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install libpff native library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpff-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r pst2pdf/requirements.txt pyinstaller

      - name: Build CLI binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --name pst2pdf-linux-x86_64 \
            --paths . \
            pst2pdf.py

      - name: Build GUI binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name pst2pdf-gui-linux-x86_64 \
            --paths . \
            --collect-data customtkinter \
            gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: pst2pdf-linux-x86_64
          path: |
            pst2pdf/dist/pst2pdf-linux-x86_64
            pst2pdf/dist/pst2pdf-gui-linux-x86_64
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        # pypff-python ships prebuilt Windows wheels that include libpff
        run: |
          pip install --upgrade pip
          pip install -r pst2pdf/requirements.txt pyinstaller

      - name: Build CLI binary
        working-directory: pst2pdf
        run: |
          pyinstaller `
            --onefile `
            --name pst2pdf-windows-x86_64 `
            --paths . `
            pst2pdf.py

      - name: Build GUI binary
        working-directory: pst2pdf
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name pst2pdf-gui-windows-x86_64 `
            --paths . `
            --collect-data customtkinter `
            gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: pst2pdf-windows-x86_64
          path: |
            pst2pdf/dist/pst2pdf-windows-x86_64.exe
            pst2pdf/dist/pst2pdf-gui-windows-x86_64.exe
          if-no-files-found: error

  # ── macOS ────────────────────────────────────────────────────────────────
  build-macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest   # apple silicon (arm64) runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install libpff via Homebrew
        run: |
          brew install libyal/libyal/libpff

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r pst2pdf/requirements.txt pyinstaller

      - name: Build CLI arm64 binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --name pst2pdf-macos-arm64 \
            --paths . \
            --target-arch arm64 \
            pst2pdf.py

      - name: Build CLI x86_64 binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --name pst2pdf-macos-x86_64 \
            --paths . \
            --target-arch x86_64 \
            pst2pdf.py

      - name: Create CLI universal binary with lipo
        working-directory: pst2pdf/dist
        run: |
          lipo -create -output pst2pdf-macos-universal \
            pst2pdf-macos-arm64 \
            pst2pdf-macos-x86_64

      - name: Build GUI arm64 binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name pst2pdf-gui-macos-arm64 \
            --paths . \
            --collect-data customtkinter \
            --target-arch arm64 \
            gui.py

      - name: Build GUI x86_64 binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name pst2pdf-gui-macos-x86_64 \
            --paths . \
            --collect-data customtkinter \
            --target-arch x86_64 \
            gui.py

      - name: Create GUI universal binary with lipo
        working-directory: pst2pdf/dist
        run: |
          lipo -create -output pst2pdf-gui-macos-universal \
            pst2pdf-gui-macos-arm64 \
            pst2pdf-gui-macos-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: pst2pdf-macos
          path: |
            pst2pdf/dist/pst2pdf-macos-arm64
            pst2pdf/dist/pst2pdf-macos-x86_64
            pst2pdf/dist/pst2pdf-macos-universal
            pst2pdf/dist/pst2pdf-gui-macos-arm64
            pst2pdf/dist/pst2pdf-gui-macos-x86_64
            pst2pdf/dist/pst2pdf-gui-macos-universal
          if-no-files-found: error

  # ── Release (runs only when all selected builds complete) ─────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    # Run even if some platform jobs were skipped (not selected)
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" dist/**/* \
            --title "pst2pdf $TAG" \
            --notes "Automated build from workflow dispatch.

          | Binary | Platform | Type |
          |--------|----------|------|
          | \`pst2pdf-linux-x86_64\` | Linux x86_64 | CLI |
          | \`pst2pdf-gui-linux-x86_64\` | Linux x86_64 | GUI |
          | \`pst2pdf-windows-x86_64.exe\` | Windows x86_64 | CLI |
          | \`pst2pdf-gui-windows-x86_64.exe\` | Windows x86_64 | GUI |
          | \`pst2pdf-macos-arm64\` | macOS Apple Silicon | CLI |
          | \`pst2pdf-gui-macos-arm64\` | macOS Apple Silicon | GUI |
          | \`pst2pdf-macos-x86_64\` | macOS Intel | CLI |
          | \`pst2pdf-gui-macos-x86_64\` | macOS Intel | GUI |
          | \`pst2pdf-macos-universal\` | macOS Universal (both) | CLI |
          | \`pst2pdf-gui-macos-universal\` | macOS Universal (both) | GUI |

          See [README](README.md) for usage instructions." \
            --prerelease
