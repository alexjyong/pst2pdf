name: Build pst2pdf Binaries

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: "Linux (x86_64)"
        type: boolean
        default: true
      build_windows:
        description: "Windows (x86_64)"
        type: boolean
        default: true


jobs:

  build-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install libpff native library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpff-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r pst2pdf/requirements.txt pyinstaller

      - name: Build CLI binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --name pst2pdf-linux-x86_64 \
            --paths . \
            pst2pdf.py

      - name: Build GUI binary
        working-directory: pst2pdf
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name pst2pdf-gui-linux-x86_64 \
            --paths . \
            --collect-data customtkinter \
            gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: pst2pdf-linux-x86_64
          path: |
            pst2pdf/dist/pst2pdf-linux-x86_64
            pst2pdf/dist/pst2pdf-gui-linux-x86_64
          if-no-files-found: error

  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        # pypff-python ships prebuilt Windows wheels that include libpff
        run: |
          pip install --upgrade pip
          pip install -r pst2pdf/requirements.txt pyinstaller

      - name: Build CLI binary
        working-directory: pst2pdf
        run: |
          pyinstaller `
            --onefile `
            --name pst2pdf-windows-x86_64 `
            --paths . `
            pst2pdf.py

      - name: Build GUI binary
        working-directory: pst2pdf
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name pst2pdf-gui-windows-x86_64 `
            --paths . `
            --collect-data customtkinter `
            gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: pst2pdf-windows-x86_64
          path: |
            pst2pdf/dist/pst2pdf-windows-x86_64.exe
            pst2pdf/dist/pst2pdf-gui-windows-x86_64.exe
          if-no-files-found: error
